# Release-artifact flow for trino-doris-connector.
#
# Trigger: push to a release branch. Two spellings are accepted so either Git
# convention works:
#     release-<version>    e.g. release-483-0.1.0
#     release/<version>    e.g. release/483-0.1.0
# In BOTH cases the release version is the branch suffix: 483-0.1.0 (<trino-major>-<semver>,
# so the Trino ABI is legible). Passed verbatim to Gradle's -Pversion; the git tag is
# v<version> (v483-0.1.0). Release assets are named with the v-prefixed tag and shipped as
# BOTH archive formats, each with a sha256 sidecar (matching the trino-ducklake convention):
#     trino-doris-v483-0.1.0.tar.gz   + .tar.gz.sha256
#     trino-doris-v483-0.1.0.zip      + .zip.sha256
# Keep the suffix free of characters illegal in a path / tag.
#
# This runs the SAME build+live-test gate as ci.yml FIRST; the assemble/zip/release
# steps only run on success, so a red build produces no artifact and no release.
name: Release

on:
  push:
    branches:
      - 'release-*'
      - 'release/*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # required for `gh release create` to push a tag + upload assets

jobs:
  release:
    name: gated build + plugin release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so release-notes generation has commits to diff

      # Derive the release version from the branch name. github.ref_name strips the
      # refs/heads/ prefix; we then strip whichever release prefix is present.
      #   release-483-2 -> 483-2   |   release/483-2 -> 483-2
      - name: Derive release version
        id: version
        run: |
          set -euo pipefail
          branch="${GITHUB_REF_NAME}"
          version="${branch#release-}"
          version="${version#release/}"
          if [ -z "${version}" ] || [ "${version}" = "${branch}" ]; then
            echo "::error::could not derive version from branch '${branch}'"
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"
          echo "Release version: ${version} (tag v${version})"

      - name: Free up disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: false

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Bring up Doris 4.1.3 cluster
        run: ./compose/up.sh

      - name: Verify cluster healthy
        run: |
          set -euo pipefail
          alive=$(docker exec trino-doris-fe mysql -h127.0.0.1 -P9030 -uroot -N \
            -e "SHOW BACKENDS" | awk -F'\t' '$10=="true"{n++} END{print n+0}')
          echo "backends alive: ${alive}"
          test "${alive}" -ge 1

      # GATE: same full build + live tests as CI, but with the release version wired in
      # via -Pversion (build.gradle.kts honors an explicit -Pversion, else defaults to
      # the dev version). If this fails, no later step runs -> no artifact, no release.
      - name: Build + live-test gate (release version)
        run: ./gradlew build --no-daemon -Pversion=${{ steps.version.outputs.version }}

      # Assemble the plugin dir and re-run the G12 bundling guard, both at the release
      # version so the produced dir is trino-doris-<version>/.
      - name: Assemble + verify plugin
        run: >-
          ./gradlew pluginAssemble verifyPluginAssembly --no-daemon
          -Pversion=${{ steps.version.outputs.version }}

      # Package BOTH .tar.gz and .zip, each with a .sha256 sidecar, named with the
      # v-prefixed tag so the Trino ABI is legible in the artifact name and matches the
      # trino-ducklake release convention: trino-doris-v<trino>-<semver>.{tar.gz,zip}(.sha256).
      # Archives extract to trino-doris-v<trino>-<semver>/ (drop straight into $TRINO_HOME/plugin/).
      - name: Package plugin archives
        id: package
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"   # e.g. 483-0.1.0
          tag="${{ steps.version.outputs.tag }}"           # e.g. v483-0.1.0
          src="build/trino-plugin/trino-doris-${version}"
          test -d "${src}" || { echo "::error::missing ${src}"; exit 1; }
          base="trino-doris-${tag}"                        # trino-doris-v483-0.1.0
          staging="build/release-staging"
          rm -rf "${staging}" && mkdir -p "${staging}"
          cp -r "${src}" "${staging}/${base}"
          ( cd "${staging}" && zip -r -q "${GITHUB_WORKSPACE}/${base}.zip" "${base}" )
          ( cd "${staging}" && tar -czf "${GITHUB_WORKSPACE}/${base}.tar.gz" "${base}" )
          ( cd "${GITHUB_WORKSPACE}" \
              && sha256sum "${base}.zip"    > "${base}.zip.sha256" \
              && sha256sum "${base}.tar.gz" > "${base}.tar.gz.sha256" )
          echo "base=${base}" >> "${GITHUB_OUTPUT}"
          echo "Packaged:"; ls -la "${GITHUB_WORKSPACE}/${base}".*

      # Create the GitHub release, tag v<version>, attach both archives + their sha256
      # sidecars, auto-generate notes. gh is preinstalled + authenticated via GITHUB_TOKEN.
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release create "${{ steps.version.outputs.tag }}"
          "${{ steps.package.outputs.base }}.tar.gz"
          "${{ steps.package.outputs.base }}.tar.gz.sha256"
          "${{ steps.package.outputs.base }}.zip"
          "${{ steps.package.outputs.base }}.zip.sha256"
          --title "${{ steps.version.outputs.tag }}"
          --target "${GITHUB_SHA}"

      - name: Collect Doris container logs
        if: failure()
        run: |
          mkdir -p docker-logs
          docker logs trino-doris-fe > docker-logs/trino-doris-fe.log 2>&1 || true
          docker logs trino-doris-be > docker-logs/trino-doris-be.log 2>&1 || true

      - name: Upload Doris container logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: doris-logs
          path: docker-logs/
          if-no-files-found: ignore
          retention-days: 14

      - name: Tear down Doris cluster
        if: always()
        run: ./compose/up.sh --down
