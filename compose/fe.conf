#####################################################################
## Stock Doris 4.1.3 FE config for the ISOLATED trino-doris P0 probe
## cluster. Copied from the stock 4.1.3 fe.conf, with two deliberate
## deviations (documented inline):
##   (1) JAVA_OPTS_FOR_JDK_17 heap dropped to 2g (matches doris-ducklake's
##       fe.conf — 8g default doesn't fit a typical dev-box memory ceiling;
##       start_fe.sh sources this file for JAVA_OPTS so an env override
##       does NOT work, the file must carry it).
##   (2) priority_networks pinned to this cluster's dedicated /24 so FE
##       restarts never bind the wrong host interface. init_fe.sh ALSO
##       appends a priority_networks line to this file at every boot; that
##       is why compose mounts a gitignored runtime copy (.fe.conf.runtime),
##       never this tracked pristine file.
#####################################################################

CUR_DATE=`date +%Y%m%d-%H%M%S`

# Log dir
LOG_DIR = ${DORIS_HOME}/log

# For jdk 17, this JAVA_OPTS will be used as default JVM options.
# Heap dropped to 2g (see header note 1).
JAVA_OPTS_FOR_JDK_17="-Dfile.encoding=UTF-8 -Djavax.security.auth.useSubjectCredsOnly=false -XX:-UseContainerSupport -Xmx2g -Xms2g -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=$LOG_DIR -Xlog:gc*:$LOG_DIR/fe.gc.log.$CUR_DATE:time,uptime:filecount=10,filesize=50M -Darrow.enable_null_check_for_get=false --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.lang.invoke=ALL-UNNAMED --add-opens=java.base/java.lang.reflect=ALL-UNNAMED --add-opens=java.base/java.io=ALL-UNNAMED --add-opens=java.base/java.net=ALL-UNNAMED --add-opens=java.base/java.nio=org.apache.arrow.memory.core,ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.util.concurrent=ALL-UNNAMED --add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/sun.nio.cs=ALL-UNNAMED --add-opens=java.base/sun.security.action=ALL-UNNAMED --add-opens=java.base/sun.util.calendar=ALL-UNNAMED --add-opens=java.security.jgss/sun.security.krb5=ALL-UNNAMED --add-opens=java.management/sun.management=ALL-UNNAMED --add-opens=java.base/jdk.internal.ref=ALL-UNNAMED --add-opens=java.xml/com.sun.org.apache.xerces.internal.jaxp=ALL-UNNAMED"

##
## the lowercase properties are read by main program.
##

http_port = 8030
rpc_port = 9020
query_port = 9030
edit_log_port = 9010
arrow_flight_sql_port = 8070

# Pin the FE to this cluster's dedicated bridge subnet (see header note 2).
priority_networks = 172.30.81.0/24

# INFO, WARN, ERROR, FATAL
sys_log_level = INFO
# NORMAL, BRIEF, ASYNC
sys_log_mode = ASYNC
