name: trino-doris-dev

# ISOLATED, evidence-grade stock Apache Doris 4.1.3 cluster for the trino-doris
# P0 protocol/type probe (see dev-docs/REPORT-protocol-type-probe-doris-4.1.3.md).
#
# This is DELIBERATELY separate from jvm/doris-ducklake's cluster:
#   - doris-ducklake runs a PATCHED master-based FE (doris-fe:pr62767-local) on
#     the 172.30.80.0/24 network and host ports 9030/8030. It must NOT be used
#     for protocol/type evidence — its FE is not a stock 4.1.3 build.
#   - This cluster runs the STOCK apache/doris:fe-4.1.3 + be-4.1.3 images, on a
#     dedicated 172.30.81.0/24 network, host ports 9130->9030 and 8130->8030, so
#     both clusters can run at once without colliding.
#
# No ducklake plugin, no substrate networks (Postgres/MinIO), no corpus mounts.
#
# Static IPs because Doris's init scripts require FE_SERVERS=name:ip:port and
# BE_ADDR=ip:port, and we want a stable target for SHOW BACKENDS / mysql clients.

services:
  doris-fe:
    image: apache/doris:fe-4.1.3
    container_name: trino-doris-fe
    hostname: trino-doris-fe
    platform: ${DORIS_FE_PLATFORM:-linux/amd64}
    environment:
      FE_SERVERS: fe1:172.30.81.10:9010
      FE_ID: "1"
    ports:
      - "9130:9030"   # FE MySQL protocol  (host 9130 -> container 9030)
      - "8130:8030"   # FE HTTP            (host 8130 -> container 8030)
    volumes:
      # fe.conf with heap dropped to 2g + priority_networks pinned. Doris's
      # start_fe.sh sources fe.conf for JAVA_OPTS_FOR_JDK_17, so an env-var
      # override does not work — the file must be replaced.
      #
      # init_fe.sh APPENDS a priority_networks line to this file at every boot,
      # so we mount a GITIGNORED runtime copy (.fe.conf.runtime) staged fresh
      # from the pristine tracked fe.conf by up.sh — never the tracked file,
      # else each run pollutes it with another appended line.
      - ./.fe.conf.runtime:/opt/apache-doris/fe/conf/fe.conf
      - fe-meta:/opt/apache-doris/fe/doris-meta
      - fe-log:/opt/apache-doris/fe/log
    networks:
      doris-net:
        ipv4_address: 172.30.81.10
    healthcheck:
      # SHOW FRONTENDS hits FE-local state only — no BE required (SELECT 1 would
      # deadlock against a BE depends_on:service_healthy gate).
      test: ["CMD-SHELL", "mysql -h127.0.0.1 -P9030 -uroot -e 'SHOW FRONTENDS' >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 60s

  doris-be:
    image: apache/doris:be-4.1.3
    container_name: trino-doris-be
    hostname: trino-doris-be
    # Host is x86_64 Linux — pin amd64 (image is multi-arch; wrong arch under
    # emulation crashes the BE's ELF symbol-index init).
    platform: ${DORIS_BE_PLATFORM:-linux/amd64}
    depends_on:
      doris-fe:
        condition: service_healthy
    environment:
      # BE reads FE_SERVERS to locate the master FE (port is the FE RPC port);
      # BE_ADDR is its own heartbeat addr (9050 default). entry_point.sh derives
      # MASTER_FE_IP / CURRENT_BE_IP / PRIORITY_NETWORKS from these.
      FE_SERVERS: fe1:172.30.81.10:9020
      BE_ADDR: 172.30.81.20:9050
    volumes:
      # be.conf with priority_networks pinned. init_be.sh APPENDS a
      # `priority_networks = …` line to be.conf on first init (empty storage),
      # so — exactly like the FE — we mount a GITIGNORED writable runtime copy
      # (.be.conf.runtime) staged fresh from the tracked pristine be.conf by
      # up.sh, never the tracked file itself (a read-only mount makes the append
      # fail and the BE dies before it can log).
      - ./.be.conf.runtime:/opt/apache-doris/be/conf/be.conf
      - be-storage:/opt/apache-doris/be/storage
      - be-log:/opt/apache-doris/be/log
    networks:
      doris-net:
        ipv4_address: 172.30.81.20
    # Doris BE is sensitive to ulimits; relax nofile to what the start scripts expect.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

networks:
  doris-net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.30.81.0/24

volumes:
  fe-meta:
  fe-log:
  be-storage:
  be-log:
