#####################################################################
## Stock Doris 4.1.3 FE config for the OPTIONAL trino-doris multi-FE
## FAILOVER OVERLAY cluster (project trino-doris-mfe, subnet
## 172.30.82.0/24). This is a THREE-FE (1 master + 2 followers)
## evidence cluster; see compose/multi-fe/README-in-compose (the
## "Multi-FE failover overlay" section of compose/README.md) and
## dev-docs/REPORT-multi-fe-failover.md.
##
## Deliberate deviations from stock 4.1.3 fe.conf (documented inline):
##   (1) JAVA_OPTS_FOR_JDK_17 heap dropped to *1g* (NOT 2g like the
##       single-FE probe cluster). Rationale: this overlay runs THREE
##       FEs at once, on a dev box that is ALSO running the single-FE
##       probe cluster (2g FE) and the doris-ducklake cluster. 3x2g +
##       BE would not fit under the free-memory ceiling; 1g is ample
##       for a metadata-only evidence cluster (no fixtures, tiny data).
##       start_fe.sh sources this file for JAVA_OPTS so an env override
##       does NOT work — the heap must live in the file.
##   (2) priority_networks pinned to this overlay's dedicated /24 so FE
##       restarts (which the failover evidence deliberately triggers)
##       never bind the wrong host interface. init_fe.sh ALSO appends a
##       priority_networks line to this file on first init; that is why
##       up.sh mounts gitignored PER-NODE runtime copies
##       (.fe1.conf.runtime / .fe2.conf.runtime / .fe3.conf.runtime),
##       never this tracked pristine file.
##
## All three FEs share this same tracked template; they differ only in
## the FE_SERVERS/FE_ID env vars (docker-compose.yml) and the static IP.
#####################################################################

CUR_DATE=`date +%Y%m%d-%H%M%S`

# Log dir
LOG_DIR = ${DORIS_HOME}/log

# For jdk 17, this JAVA_OPTS will be used as default JVM options.
# Heap dropped to 1g (see header note 1 — three FEs must co-tenant a dev box).
JAVA_OPTS_FOR_JDK_17="-Dfile.encoding=UTF-8 -Djavax.security.auth.useSubjectCredsOnly=false -XX:-UseContainerSupport -Xmx1g -Xms1g -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=$LOG_DIR -Xlog:gc*:$LOG_DIR/fe.gc.log.$CUR_DATE:time,uptime:filecount=10,filesize=50M -Darrow.enable_null_check_for_get=false --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.lang.invoke=ALL-UNNAMED --add-opens=java.base/java.lang.reflect=ALL-UNNAMED --add-opens=java.base/java.io=ALL-UNNAMED --add-opens=java.base/java.net=ALL-UNNAMED --add-opens=java.base/java.nio=org.apache.arrow.memory.core,ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.util.concurrent=ALL-UNNAMED --add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/sun.nio.cs=ALL-UNNAMED --add-opens=java.base/sun.security.action=ALL-UNNAMED --add-opens=java.base/sun.util.calendar=ALL-UNNAMED --add-opens=java.security.jgss/sun.security.krb5=ALL-UNNAMED --add-opens=java.management/sun.management=ALL-UNNAMED --add-opens=java.base/jdk.internal.ref=ALL-UNNAMED --add-opens=java.xml/com.sun.org.apache.xerces.internal.jaxp=ALL-UNNAMED"

##
## the lowercase properties are read by main program.
##

http_port = 8030
rpc_port = 9020
query_port = 9030
edit_log_port = 9010
arrow_flight_sql_port = 8070

# Pin every FE to this overlay's dedicated bridge subnet (see header note 2).
priority_networks = 172.30.82.0/24

# INFO, WARN, ERROR, FATAL
sys_log_level = INFO
# NORMAL, BRIEF, ASYNC
sys_log_mode = ASYNC
