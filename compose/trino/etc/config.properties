#
# Single-node Trino coordinator for the trino-doris MANUAL smoke sandbox.
#
# This REPLACES the stock trinodb/trino:483 /etc/trino/config.properties, which
# ships `catalog.management=${ENV:CATALOG_MANAGEMENT}` (i.e. it REQUIRES a
# CATALOG_MANAGEMENT env var and fails to start if it is unset/empty). We pin the
# value in-file instead so the sandbox is self-contained and the setting is
# visible/auditable here rather than hidden in compose env.
#
coordinator=true
node-scheduler.include-coordinator=true
discovery.uri=http://localhost:8080

# Dynamic catalog management: enables `CREATE CATALOG ... USING doris WITH (...)`
# and `DROP CATALOG` at runtime (https://trino.io/docs/current/sql/create-catalog.html).
catalog.management=dynamic

# Where dynamically created catalogs are persisted. `memory` keeps them only for
# the life of the container — perfect for a manual sandbox (no leftover catalog
# files to clean up; every `up.sh` starts clean). Switch to `file` (with
# `catalog.config-dir=/etc/trino/catalog`) if you want catalogs to survive a
# container restart.
catalog.store=memory
